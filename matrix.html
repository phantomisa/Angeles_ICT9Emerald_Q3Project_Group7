<body>

	<div id="form-container">
		<h1 style="font-size: 40px; margin-bottom: 50px; font-weight: bold; color: #BF1134;">FARE MATRIX</h>
		<br>
		<p style="font-size: 18px; font-weight: normal; margin-bottom: 40px; color:#1c475c;">Don't know where or when to go? Check the schedule <a href="page2.html">here!</a> </p>

		<div id="form">
			<form>
			<div style="display: flex; flex-direction: row; gap: 100px;">
				<label for="location" style="font-size: 30px; color:#1c475c;">LOCATION</label>
                    <select name="location" class="form-control" id="location">
                        <option default value="n/a1" >Select location</option>
                        <option value="1">North Avenue</option>
                        <option value="2">Quezon Avenue</option>
                        <option value="3">Kamuning</option>
                        <option value="4">Araneta Center-Cubao</option>
                        <option value="5">Santolan-Annapolis</option>
                        <option value="6">Ortigas</option>
                        <option value="7">Shaw Boulevard</option>
                        <option value="8">Boni</option>
                        <option value="9">Guadalupe</option>
                        <option value="10">Buendia</option>
                        <option value="11"> Alaya</option>
                        <option value="12">Magallanes</option>
                        <option value="13">Taft Avenue</option>
                        </select>
			</div>

			<p style="justify-self: center; margin-top: -2%; margin-bottom: 4.5%; font-weight: normal; color:#1c475c;">________________________</p>

			<div style="display: flex; flex-direction: row; gap: 53.5px; margin-bottom: 8%;">
				<label for="destination" style="font-size: 30px; color:#1c475c;">DESTINATION</label>
                    <select name="destination" class="form-control" id="destination">
                        <option default value="n/a2" >Select destination</option>
                       <option value="1">North Avenue</option>
                        <option value="2">Quezon Avenue</option>
                        <option value="3">Kamuning</option>
                        <option value="4">Araneta Center-Cubao</option>
                        <option value="5">Santolan-Annapolis</option>
                        <option value="6">Ortigas</option>
                        <option value="7">Shaw Boulevard</option>
                        <option value="8">Boni</option>
                        <option value="9">Guadalupe</option>
                        <option value="10">Buendia</option>
                        <option value="11"> Alaya</option>
                        <option value="12">Magallanes</option>
                        <option value="13">Taft Avenue</option>
                        </select>
			</div>

			<div style="font-size: 18px">
				<h3 style="font-size: 30px; font-weight: bold; color:#1c475c;">DISCOUNT ELIGIBILITY (50% OFF)</h3>
				<div style="display: flex; justify-self: center; font-weight: normal; margin-left: -40px; margin-right: -40px; color:#1c475c;" id="discount"> 
					<input class="form-check" type="radio" name="discount" id="pwd"value="pwd" >
			    	<label class="form-check-label" for="pwd" style="margin-left: 7px">Person with Disabilities (PwD)</label>

			    	<input class="form-check" type="radio" name="discount" id="senior"value="senior" style="margin-left: 20px">
			    	<label class="form-check-label" for="senior" style="margin-left: 7px">Senior Citizen</label>

			    	<input class="form-check" type="radio" name="discount" id="student" value="student" style="margin-left: 20px">
			    	<label class="form-check-label" for="student" style="margin-left: 7px">Student</label>

			    	<input class="form-check" type="radio" name="discount" id="n/a" value="n/a" style="margin-left: 20px">
			    	<label class="form-check-label" for="n/a" style="margin-left: 7px">None of the above</label>
			    </div>
			</div>
			</form>
		</div>

			<div>
				<button onclick="calculate()" class="form-control" style="justify-self: center; margin: 3%; width: 30%; font-size: 25px; font-weight: bold; background-color: #bf1134; border-color: #800616; color: white;">CALCULATE</button>
			</div>

			<div id="result"></div>
	</div>

	 <div id="copyright" class="copyright-footer">
        <p class="copyright-text mb-0">© 2026 MRT Line 3 (North Avenue - Taft Avenue). All Rights Reserved.</p>
    </div>

	<footer id="bottom" class="end-footer">
        <p><strong>By Group - 7: Chan, Rivera, and Santos, L.</strong> | 9-Emerald</p>
    </footer>

	<script>
		const pill = document.getElementById('copyright');
		const footer = document.getElementById('bottom');

		const observer = new IntersectionObserver((entries) => {
		    entries.forEach(entry => {
		        if (entry.isIntersecting) {
		            pill.classList.add('hidden');
		        } else {
		            pill.classList.remove('hidden');
		        }
		    });
		}, { threshold: 0.01 });

		observer.observe(footer);

		function calculate(){
			let location = document.getElementById("location").value;
			let destination = document.getElementById("destination").value;

			let discount = null;
				if (document.getElementById("pwd").checked) discount = "pwd";
				else if (document.getElementById("senior").checked) discount = "senior";
				else if (document.getElementById("student").checked) discount = "student";
				else if (document.getElementById("n/a").checked) discount = "n/a";

			if (location === destination) {
				alert("You're already there!");
				return;
			}

			if (location === "n/a1" || destination === "n/a2"){
				alert("Fill out all fields!");
				return;
			}

			let start = parseInt(location);
			let end   = parseInt(destination);

			let distance = Math.abs(start - end);

			let regularfare;
			    if (distance <= 3) {
			        regularfare = 13;
			    } else if (distance <= 6) {
			        regularfare = 16;
			    } else if (distance <= 9) {
			        regularfare = 20;
			    } else if (distance <= 12) {
			        regularfare = 24;
			    } else {
			        regularfare = 28;
			    }

			let finalfare = regularfare;

				if (discount === "pwd" || discount === "senior" || discount === "student") {
				    finalfare = Math.round(regularfare * 0.5);
				}

			document.getElementById("result").innerHTML = "Your fare will cost " + finalfare + " pesos."

		}
	</script>
