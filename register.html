<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fare Matrix</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="styles.css" rel="stylesheet">

    <style>
        .nav-link{
                    color: #9fbec4;
                }
                .nav-link:hover {
                    color: #bf1134;;
                }
                #register{
                    background-color:#9fbec4;
                    color: #2f596e;
                }
                #register:hover {
                    color: white;
                    background-color: #bf1134;
                    border-color: #bf1134;
                }
        body{
            background: url(background.png);
            background-size: cover;
            height: 700px;
            font-family: sans-serif;
            color: #1c475c;
            overflow-x:hidden;
            overflow-y: scroll;
            color: #1c475c;
        }
        .container {
                    width: 85%;
                    margin: 50px auto;
                    background-color: #9fbec4;
                    padding: 3%;
                    border-radius: 10px;
                    box-shadow: rgba(0, 0, 0, 0.3) 0px 3px 5px 3px;
                    display: flex;
                    flex-direction: column;
                }
                .form-area {
                    display: flex;
                    justify-content: center;
                    align-items: stretch; 
                    margin-top: 40px;
                    gap: 50px;
                }

                .profile-thing {
                    width: 35%;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    text-align: center;
                }

                .profile-pic {
                    width: 280px; 
                    height: 280px;
                    border-radius: 50%;
                    background: #fff;
                    border: 2px solid #000; 
                    position: relative;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    overflow: hidden;
                    border: none; 
                    outline: none;
                }

                .profile-pic img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                }

                #placeholder {
                    position: absolute;
                    font-size: 20px;
                    font-weight: bold;
                }

                #pfp {
                    display: none;
                }

                .upload {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    margin-top: 25px;
                    width: 100%;
                }

                 .custom-pic, .upload-btn {
                    display: block;
                    width: 220px;
                    padding: 12px 15px; 
                    margin: 8px 0;
                    background: #bad6db;
                    border-radius: 10px;
                    color: #bf1134;
                    cursor: pointer;
                    font-family: inherit;
                    font-size: 18px;
                    font-weight: bold;
                    text-align: center;
                    transition: 0.2s;
                    border: none; 
                    outline: none;
                }

                .upload-btn:hover, .custom-pic:hover {
                    transform: scale(1.05);
                    text-shadow: none;
                    background-color: #bf1134;
                    color: white;
                }

                .form-box {
                    width: 55%;
                    display: flex;
                    flex-direction: column;
                    justify-content: space-between;
                    opacity: 100%;
                }

                .form-box label {
                    display: block;
                    font-weight: bold;
                    font-size: 25px;
                    margin-top: 15px;
                }

                input {
                    width: 100%;
                    padding: 10px;
                    margin: 5px 0 10px 0;
                    border-radius: 10px;
                    font-size: 16px;
                    border: none; 
                    outline: none;
                }

                .checkbox-row {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    margin-top: 10px;
                }

                .checkbox-row input {
                    width: 20px;
                    height: 20px;
                    margin: 0;
                }

                .checkbox-row label {
                    display: inline;
                    font-size: 18px;
                    margin: 0;
                }

                label[for="terms"]:hover {
                    text-shadow: none;
                    color: #bf1134;
                }

                #terms:checked + label {
                     color: #bf1134;
                     text-shadow: none;
                     text-decoration: underline;
                }

                .button-row {
                    width: 100%;
                    text-align: center;
                    margin-top: 50px;
                }

                .action-btn {
                    width: 250px;
                    padding: 15px;
                    margin: 0 20px;
                    background: #bad6db;
                    border-radius: 10px;
                    color: #bf1134;
                    cursor: pointer;
                    font-size: 20px;
                    font-weight: bold;
                    transition: 0.3s;
                    font-family: sans-serif;
                    border: none; 
                    outline: none;
                }

                .action-btn:hover {
                    transform: scale(1.05);
                    background-color: #bf1134;
                    color: white;
                    text-shadow: none;
                }
        .end-footer {
                        background-color: #102129;
                        color: #bf1134;
                        text-align: center;
                        padding: 30px 20px !important;
                        width: 100%;
                        display: block;
                        flex-shrink: 0;
                        font-family: sans-serif;
                        box-shadow: rgba(0, 0, 0, 0.3) 5px 3px 5px 3px;
                    }
                    .copyright-footer {
                        position: fixed;
                        bottom: 30px;
                        left: 50%;
                        transform: translateX(-50%);
                        background: rgba(255, 255, 255, 0.95);
                        padding: 15px 30px !important;
                        border-radius: 50px;
                        display: flex;
                        gap: 10px;
                        box-shadow: rgba(0, 0, 0, 0.3) 0px 2px 3px 0px;
                        backdrop-filter: blur(10px);
                        z-index: 10000;
                        transition: all 0.3s ease-in-out;
                        align-items: center;
                        background-color: #bad6db;
                    }

                    .hidden {
                        opacity: 0;
                        transform: translate(-50%, 40px);
                        pointer-events: none;
                    }

                    .nav-btn {
                        padding: 10px 15px !important;
                        background-color: #880e4f;
                        color: white;
                        text-decoration: none;
                        border-radius: 30px;
                        font-weight: bold;
                        transition: 0.3s;
                        font-family: sans-serif;
                        border: none;
                        cursor: pointer;
                        appearance: none;
                        -webkit-appearance: none;
                        text-align: center;
                        min-width: 90px;
                    }

                    .nav-btn:hover {
                        background-color: #c2185b;
                        transform: scale(1.05);
                    }

                    .copyright-text {
                        color: #bf1134;
                        font-family: sans-serif;
                        font-size: 15px;
                        font-weight: bold;
                        white-space: nowrap;
                    }

    </style>

</head>
<body>

    <nav class="navbar navbar-expand-lg" style="background-color: #102129; padding: 1%; box-shadow: rgba(0, 0, 0, 0.3) 5px 3px 5px 3px;">
                <div class="container-fluid">
                    <a class="navbar-brand" href="index.html"><img src="logo.png" alt="logo" height="50px" style="color: #9fbec4;"></a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="mynavbar">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
                            <li class="nav-item"><a class="nav-link" href="matrix.html" style="margin-left: 7px;">Fare Matrix</a></li>
                            <li class="nav-item"><a class="nav-link" href="help.html" style="margin-left: 7px;">Help</a></li>

                        </ul>

                        <form class="d-flex">
                            <button onclick="location.href='register.html'" class="btn" type="button" style="font-weight: bold;" id="register">Create Account</button>
                        </form>
                    </div>
                </div>
    </nav>

    <div class="container">
            <h2 style="font-weight: bold;font-size: 50px; text-align: center; color: #bf1134; margin-bottom: 0;">ACCOUNT REGISTRATION</h2>
            <p style="font-size: 20px; text-align: center; margin-top: 3px;">Kindly fill out the whole form to create an account.</p>

            <div class="form-area">
                <div class="profile-thing">
                    <div class="profile-pic">
                        <span id="placeholder">Upload Profile</span>
                        <img src="" id="preview">
                    </div>
                    <div class="upload">
                        <input type="file" id="pfp" accept="image/*">
                        <label for="pfp" class="custom-pic">Choose File</label>
                        <button type="button" class="upload-btn">Upload Photo</button>
                    </div>
                </div>

                <div class="form-box">
                    <div>
                        <label for="first">First Name:</label>
                        <input type="text" id="first" placeholder="Enter your First Name">

                        <label for="last">Last Name:</label>
                        <input type="text" id="last" placeholder="Enter your Last Name">

                        <label for="contact">Contact Number:</label>
                        <input type="tel" id="contact" placeholder="Enter your Contact Number" required>

                        <label for="email">Email Address:</label>
                        <input type="email" id="email" placeholder="Enter your Email Address" required>

                        <label for="user">Username:</label>
                        <input type="text" id="user" placeholder="Enter your Username">

                        <label for="pwd">Password:</label>
                        <input type="password" id="pwd" placeholder="Enter your Password">
                    </div>

                    <div class="checkbox-row">
                        <input type="checkbox" id="terms">
                        <label for="terms">I accept the Terms of Use and Privacy Policy</label>
                    </div>
                </div>
            </div>

            <div class="button-row">
                <button class="action-btn" onclick="register()">Create Account</button>
                <button class="action-btn" type="reset" onclick="window.location.reload()">Cancel</button>
            </div>
        </div>

             <div id="copyright" class="copyright-footer">
                <p class="copyright-text mb-0">© 2026 MRT Line 3 (North Avenue - Taft Avenue). All Rights Reserved.</p>
            </div>

            <footer id="bottom" class="end-footer">
                <p><strong>By Group - 7: Chan, Rivera, and Santos, L.</strong> | 9-Emerald</p>
            </footer>

        <script>

            const pill = document.getElementById('copyright');
            const footer = document.getElementById('bottom');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        pill.classList.add('hidden');
                    } else {
                        pill.classList.remove('hidden');
                    }
                });
            }, { threshold: 0.01 });

            observer.observe(footer);



            function register() {
                let email = document.getElementById("email").value;
                let contact = document.getElementById("contact").value;
                let terms = document.getElementById("terms").checked;

                if (email == "" || contact == "") {
                    alert("Kindly complete the form.");
                    return;
                }

                if (!terms) {
                    alert("You must accept the Terms of Use to continue.");
                    return;
                }

                alert("Account created!");
                alert("Registration successful! :)");
            }

            document.getElementById("pfp").onchange = function(event) {
                let reader = new FileReader();
                reader.onload = function() {
                    document.getElementById("preview").src = reader.result;
                    document.getElementById("placeholder").style.display = "none";
                }
                if (event.target.files[0]) {
                    reader.readAsDataURL(event.target.files[0]);
                }
            }

            document.querySelectorAll('.form-box input').forEach(input => {
            input.addEventListener('input', function() {
                let label = this.previousElementSibling;
                if (this.value.length > 0) {
                    label.style.color = "black";
                    label.style.textShadow = "none";
                } else {
                    label.style.color = "white";
                    label.style.textShadow = "0.5px 1px 1.5px #000";
                }
                });
            });

        </script>

</body>
</html>
